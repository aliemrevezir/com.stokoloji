name: Build & Push (GHCR)

# Build'i VPS'ten GitHub Actions'a taşır: web + cms image'larını GHCR'a push eder.
# Coolify artık build etmez, yalnız pull eder (deploy ~26 dk -> ~2-3 dk, OOM biter).
#
# Gerekli repo ayarları (Settings > Secrets and variables > Actions):
#   Variables (gizli değil, build-time gömülür):
#     NEXT_PUBLIC_STRAPI_URL, NEXT_PUBLIC_SITE_URL, NEXT_PUBLIC_GA4_ID,
#     NEXT_PUBLIC_CLARITY_ID, GOOGLE_SITE_VERIFICATION
#   (Opsiyonel) Coolify otomatik deploy:
#     Variable COOLIFY_WEBHOOK_URL + Secret COOLIFY_TOKEN

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  cms:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push cms
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/cms/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/stokoloji-cms:latest
            ghcr.io/${{ github.repository_owner }}/stokoloji-cms:${{ github.sha }}
          cache-from: type=gha,scope=cms
          cache-to: type=gha,mode=max,scope=cms

  web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile.prod
          push: true
          # NEXT_PUBLIC_* build-time gömülür → repo Variables'tan gelir.
          build-args: |
            NEXT_PUBLIC_STRAPI_URL=${{ vars.NEXT_PUBLIC_STRAPI_URL }}
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_GA4_ID=${{ vars.NEXT_PUBLIC_GA4_ID }}
            NEXT_PUBLIC_CLARITY_ID=${{ vars.NEXT_PUBLIC_CLARITY_ID }}
            GOOGLE_SITE_VERIFICATION=${{ vars.GOOGLE_SITE_VERIFICATION }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/stokoloji-web:latest
            ghcr.io/${{ github.repository_owner }}/stokoloji-web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  # İki image da push edildikten sonra Coolify'ı tetikle (yalnız webhook tanımlıysa).
  deploy:
    needs: [cms, web]
    runs-on: ubuntu-latest
    if: ${{ vars.COOLIFY_WEBHOOK_URL != '' }}
    steps:
      - name: Trigger Coolify deploy
        run: |
          curl -fsSL -X GET "${{ vars.COOLIFY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
