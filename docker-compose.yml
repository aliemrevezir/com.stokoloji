# Stokoloji — demo compose. `docker compose up` ile db + cms + web ayağa kalkar.
# Gizli anahtarlar burada DEV amaçlı sabittir; üretimde .env üzerinden geçilmelidir.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-stokoloji}
      POSTGRES_USER: ${DATABASE_USERNAME:-stokoloji}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-stokoloji}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-stokoloji} -d ${DATABASE_NAME:-stokoloji}"]
      interval: 5s
      timeout: 5s
      retries: 10

  cms:
    build:
      context: .
      dockerfile: apps/cms/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 1337
      DATABASE_CLIENT: postgres
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-stokoloji}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-stokoloji}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-stokoloji}
      DATABASE_SSL: "false"
      APP_KEYS: ${APP_KEYS:-devKeyOne==,devKeyTwo==,devKeyThree==,devKeyFour==}
      API_TOKEN_SALT: ${API_TOKEN_SALT:-devApiTokenSaltChangeMe==}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-devAdminJwtSecretChangeMe==}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT:-devTransferTokenSaltChangeMe==}
      JWT_SECRET: ${JWT_SECRET:-devJwtSecretChangeMe==}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-devEncryptionKeyChangeMe16Byte==}
      # macOS/Docker bind mount'larda Strapi'nin (chokidar) dosya değişikliklerini
      # algılaması için polling. autoReload host'taki düzenlemelerde tetiklensin.
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "1337:1337"
    # Canlı geliştirme: host kaynağını container'a bağla → `strapi develop`
    # autoReload host'taki değişiklikleri görür, yeniden build gerekmez.
    # node_modules ve Strapi build artifact'ları anonymous volume ile korunur
    # (image içindeki kurulu bağımlılıklar / platforma özel binary'ler gölgelenmesin).
    volumes:
      - ./apps/cms:/repo/apps/cms
      - strapi_uploads:/repo/apps/cms/public/uploads
      - /repo/node_modules
      - /repo/apps/cms/node_modules
      - /repo/apps/cms/.strapi
      - /repo/apps/cms/.cache
      - /repo/apps/cms/build
      - /repo/apps/cms/dist
      - /repo/apps/cms/.tmp
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://localhost:1337/_health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 90s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      # macOS/Docker bind mount'larda dosya değişikliklerinin algılanması için
      # webpack/next watcher'ı polling moduna al (HMR canlı çalışsın).
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      # SSR/build içi internal çağrı:
      STRAPI_INTERNAL_URL: http://cms:1337
      # Tarayıcı çağrıları:
      NEXT_PUBLIC_STRAPI_URL: ${NEXT_PUBLIC_STRAPI_URL:-http://localhost:1337}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      STRAPI_API_TOKEN: ${STRAPI_API_TOKEN:-}
      NEXT_PUBLIC_GA4_ID: ${NEXT_PUBLIC_GA4_ID:-}
      NEXT_PUBLIC_CLARITY_ID: ${NEXT_PUBLIC_CLARITY_ID:-}
      GOOGLE_SITE_VERIFICATION: ${GOOGLE_SITE_VERIFICATION:-}
      # Newsletter (Listmonk) — SUNUCU tarafı; token tarayıcıya gitmez.
      # Internal network: web → listmonk:9000. User/token/list Listmonk admin'den.
      LISTMONK_API_URL: ${LISTMONK_API_URL:-http://listmonk:9000}
      LISTMONK_API_USER: ${LISTMONK_API_USER:-}
      LISTMONK_API_TOKEN: ${LISTMONK_API_TOKEN:-}
      LISTMONK_LIST_ID: ${LISTMONK_LIST_ID:-}
    ports:
      - "3000:3000"
    # Canlı geliştirme: host kaynağı container'a bağla; node_modules ve .next'i
    # anonymous volume ile koru (image içindeki kurulu bağımlılıklar gölgelenmesin).
    volumes:
      - ./apps/web:/repo/apps/web
      - ./packages:/repo/packages
      - /repo/node_modules
      - /repo/apps/web/node_modules
      - /repo/apps/web/.next
      - /repo/packages/api-client/node_modules
      - /repo/packages/ui/node_modules
    depends_on:
      cms:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  # Listmonk newsletter / lead-magnet ESP. Kendi postgres'i (Strapi DB'sinden
  # izole) + Amazon SES'i SMTP relay olarak kullanır (SMTP, admin panelinden
  # girilir: Settings > SMTP → email-smtp.eu-central-1.amazonaws.com:587 STARTTLS).
  listmonk_db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${LISTMONK_DB_NAME:-listmonk}
      POSTGRES_USER: ${LISTMONK_DB_USER:-listmonk}
      POSTGRES_PASSWORD: ${LISTMONK_DB_PASSWORD:-listmonk}
    volumes:
      - listmonk_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LISTMONK_DB_USER:-listmonk} -d ${LISTMONK_DB_NAME:-listmonk}"]
      interval: 5s
      timeout: 5s
      retries: 10

  listmonk:
    image: listmonk/listmonk:latest
    restart: unless-stopped
    # İlk açılışta tabloları kur (idempotent) + migrasyonları uygula, sonra başlat.
    command: ["sh", "-c", "./listmonk --install --idempotent --yes && ./listmonk --upgrade --yes && ./listmonk"]
    environment:
      TZ: Europe/Istanbul
      LISTMONK_app__address: 0.0.0.0:9000
      LISTMONK_db__host: listmonk_db
      LISTMONK_db__port: "5432"
      LISTMONK_db__user: ${LISTMONK_DB_USER:-listmonk}
      LISTMONK_db__password: ${LISTMONK_DB_PASSWORD:-listmonk}
      LISTMONK_db__database: ${LISTMONK_DB_NAME:-listmonk}
      LISTMONK_db__ssl_mode: disable
      # İlk süper admin (yalnız ilk --install'da oluşturulur).
      LISTMONK_ADMIN_USER: ${LISTMONK_ADMIN_USER:-admin}
      LISTMONK_ADMIN_PASSWORD: ${LISTMONK_ADMIN_PASSWORD:-listmonkadmin}
    ports:
      - "9000:9000"
    volumes:
      - listmonk_uploads:/listmonk/uploads
    depends_on:
      listmonk_db:
        condition: service_healthy

  # Opsiyonel reverse proxy — `docker compose --profile proxy up` ile etkinleşir.
  caddy:
    image: caddy:2-alpine
    profiles: ["proxy"]
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - web
      - cms

volumes:
  pgdata:
  strapi_uploads:
  listmonk_data:
  listmonk_uploads:
