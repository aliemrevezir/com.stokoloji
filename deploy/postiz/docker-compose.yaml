# Postiz — self-hosted (Stokoloji sosyal otomasyon)
#
# LEAN profil: Elasticsearch YOK. Temporal, visibility'yi kendi postgres'inde tutar
# (development-sql dynamic config). Bu, resmi compose'daki ~1-2 GB'lik Elasticsearch'u
# stack'ten siler; 6 GB VPS'te yasayabilir hale getirir.
#
# Calisan servisler:
#   postiz            -> uygulama (frontend + backend + cron, tek container, port 5000)
#   postiz-postgres   -> Postiz veritabani
#   postiz-redis      -> kuyruk / cache
#   temporal-postgresql -> Temporal'in kendi DB'si (+ visibility)
#   temporal          -> workflow motoru (zamanlama)
#
# Coolify: bu dosyayi "Docker Compose" kaynagi olarak kullan. Secret'lar (JWT_SECRET,
# parolalar, sosyal API anahtarlari) Coolify env panelinden gelir; .env.example'a bak.
# temporal-ui ve admin-tools bilincli olarak CIKARILDI (RAM + attack surface). Gerekirse
# README'deki opsiyonel blogu ekle.

services:
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: postiz
    restart: always
    environment:
      # === Zorunlu cekirdek ===
      MAIN_URL: "${POSTIZ_MAIN_URL}"
      FRONTEND_URL: "${POSTIZ_MAIN_URL}"
      NEXT_PUBLIC_BACKEND_URL: "${POSTIZ_MAIN_URL}/api"
      BACKEND_INTERNAL_URL: "http://localhost:3000"
      JWT_SECRET: "${POSTIZ_JWT_SECRET}"
      DATABASE_URL: "postgresql://postiz-user:${POSTIZ_DB_PASSWORD}@postiz-postgres:5432/postiz-db"
      REDIS_URL: "redis://postiz-redis:6379"
      TEMPORAL_ADDRESS: "temporal:7233"
      IS_GENERAL: "true"
      RUN_CRON: "true"
      # Ilk admin kaydindan SONRA Coolify'da 'true' yapip redeploy et (kapali kayit).
      DISABLE_REGISTRATION: "${POSTIZ_DISABLE_REGISTRATION:-false}"

      # === Depolama (local volume) ===
      STORAGE_PROVIDER: "local"
      UPLOAD_DIRECTORY: "/uploads"
      NEXT_PUBLIC_UPLOAD_DIRECTORY: "/uploads"

      # === Public API rate limit (saatlik create-post) ===
      API_LIMIT: "${POSTIZ_API_LIMIT:-90}"

      # === Sosyal saglayicilar (Coolify env'den; bos ise o platform pasif) ===
      X_API_KEY: "${X_API_KEY:-}"
      X_API_SECRET: "${X_API_SECRET:-}"
      LINKEDIN_CLIENT_ID: "${LINKEDIN_CLIENT_ID:-}"
      LINKEDIN_CLIENT_SECRET: "${LINKEDIN_CLIENT_SECRET:-}"
    volumes:
      - postiz-config:/config/
      - postiz-uploads:/uploads/
    ports:
      - "4007:5000"
    networks:
      - postiz-network
      - temporal-network
    healthcheck:
      test: ["CMD", "node", "-e", "const r=require('http').get('http://localhost:5000/',res=>process.exit(res.statusCode<500?0:1));r.on('error',()=>process.exit(1));r.setTimeout(4000,()=>{r.destroy();process.exit(1)})"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy
      temporal:
        condition: service_healthy

  postiz-postgres:
    image: postgres:17-alpine
    container_name: postiz-postgres
    restart: always
    environment:
      POSTGRES_USER: postiz-user
      POSTGRES_PASSWORD: "${POSTIZ_DB_PASSWORD}"
      POSTGRES_DB: postiz-db
    volumes:
      - postiz-postgres-data:/var/lib/postgresql/data
    networks:
      - postiz-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postiz-user -d postiz-db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postiz-redis:
    image: redis:7.2-alpine
    container_name: postiz-redis
    restart: always
    command: ["redis-server", "--maxmemory", "96mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - postiz-redis-data:/data
    networks:
      - postiz-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # --- Temporal (LEAN: postgres visibility, Elasticsearch yok) ---
  temporal-postgresql:
    image: postgres:16-alpine
    container_name: temporal-postgresql
    restart: always
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: "${TEMPORAL_DB_PASSWORD}"
    volumes:
      - temporal-postgres-data:/var/lib/postgresql/data
    networks:
      - temporal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  temporal:
    image: temporalio/auto-setup:1.28.1
    container_name: temporal
    restart: always
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=${TEMPORAL_DB_PASSWORD}
      - POSTGRES_SEEDS=temporal-postgresql
      - TEMPORAL_NAMESPACE=default
      # ES yok -> standart (postgres) visibility; dynamic config dosyasi ile.
      - ENABLE_ES=false
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    # NOT: dynamic config bind-mount DEGIL, compose `configs:` ile inline gomulu.
    # Coolify git-compose kaynaginda relative bind-mount'lar (./dynamicconfig) host'a
    # guvenilir inmiyordu -> "no such file or directory" + temporal restart loop.
    configs:
      - source: temporal-dynamicconfig
        target: /etc/temporal/config/dynamicconfig/development-sql.yaml
    networks:
      - temporal-network
    depends_on:
      temporal-postgresql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "temporal:7233"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s

volumes:
  postiz-postgres-data:
  postiz-redis-data:
  postiz-config:
  postiz-uploads:
  temporal-postgres-data:

# Temporal dynamic config — inline (bind-mount yerine). Icerik dynamicconfig/development-sql.yaml
# ile ayni; tek dogruluk kaynagi olarak burayi duzenle. Coolify bind-mount sorununu bypass eder.
configs:
  temporal-dynamicconfig:
    content: |
      limit.maxIDLength:
        - value: 255
          constraints: {}
      system.forceSearchAttributesCacheRefreshOnRead:
        - value: true
          constraints: {}

networks:
  postiz-network:
  temporal-network:
